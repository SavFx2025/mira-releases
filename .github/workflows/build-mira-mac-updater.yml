name: Build Mira desktop release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Mira Desktop branch, tag, or SHA to build.
        required: true
        default: main
      version:
        description: Release version to stamp into package.json before packaging.
        required: true
        default: 1.2.3
      publish:
        description: Publish or update the GitHub release.
        required: true
        default: 'true'

permissions:
  contents: write

concurrency:
  group: mira-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            platform: mac
            builder_args: --mac dmg zip --arm64
          - label: Windows x64
            os: windows-latest
            platform: win
            builder_args: --win nsis --x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - name: Checkout Mira Desktop source
        uses: actions/checkout@v4
        with:
          repository: SavFx2025/mira-desktop
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.MIRA_DESKTOP_SOURCE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install uv on macOS
        if: runner.os == 'macOS'
        run: brew install uv

      - name: Install uv on Windows
        if: runner.os == 'Windows'
        run: pip install uv

      - name: Install dependencies
        run: npm ci

      - name: Validate and stamp release version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$version" ]]; then
            npm version "$version" --no-git-tag-version
          fi

      - name: Build renderer and Electron main/preload
        run: npm run build

      - name: Build installer assets
        run: npx electron-builder ${{ matrix.builder_args }} --publish never

      - name: Validate release metadata
        run: npm run release:validate -- --platform=${{ matrix.platform }}

      - name: Upload platform assets
        uses: actions/upload-artifact@v4
        with:
          name: mira-${{ matrix.platform }}-${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml

  publish:
    name: Verify and publish Mira ${{ inputs.version }}
    if: ${{ inputs.publish == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download platform assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify complete release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          cd release-assets
          require() {
            [[ -s "$1" ]] || { echo "Missing required release asset: $1" >&2; exit 1; }
          }
          require "Mira-${version}-arm64.dmg"
          require "Mira-${version}-arm64.zip"
          require "latest-mac.yml"
          require "Mira-Setup-${version}-x64.exe"
          require "latest.yml"
          printf 'Verified assets:\n'
          find . -maxdepth 1 -type f -print | sort

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          Mira ${{ inputs.version }}

          - Keeps chart and indicator panes on one frame-coordinated timeline.
          - Adds independent TradingView-style indicator pane value scaling.
          - Opens Workspace and Notes to every valid Mira subscription.
          - Includes downloadable macOS and Windows desktop installers.
          EOF

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          assets=(release-assets/*)
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "Mira ${{ inputs.version }}" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "Mira ${{ inputs.version }}" \
              --notes-file release-notes.md \
              --latest
          fi
